# Shadowrocket 配置（由 Quantumult X 配置转换）
# 原文件：quantumult_20260716165924.conf
# 转换说明：
# 1. 原配置没有节点订阅/本地节点，[Proxy] 保持为空；请在 Shadowrocket 里添加订阅或手动添加节点。
# 2. Quantumult X 的 task_local 已尽量转为 Shadowrocket [Script] cron/手动脚本。
# 3. Quantumult X 远程 rewrite 订阅格式不完全等价，已作为模块/脚本订阅参考保留在注释中，建议在 Shadowrocket 的「模块」里单独添加兼容 .sgmodule 的链接。
# 4. Quantumult X 的 p12/passphrase 证书不通用，未写入；Shadowrocket 请使用自身的 MITM 证书。

[General]
# 延迟测试 URL
test-url = http://www.gstatic.com/generate_204
internet-test-url = http://www.gstatic.com/generate_204
proxy-test-url = http://www.gstatic.com/generate_204
# DNS 与绕过
bypass-system = true
skip-proxy = 127.0.0.1, localhost, *.local, *.10099.com.cn, *.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn
# 原 QX excluded_routes
tun-excluded-routes = 239.255.255.250/32, 24.105.30.129/32, 185.60.112.157/32, 185.60.112.158/32, 182.162.132.1/32
# 禁用 IPv6（对应 no-ipv6）
ipv6 = false
# UDP 443 / STUN / QUIC 在 Shadowrocket 中没有完全等价的全局写法；如需要请在应用内按需关闭 UDP/QUIC。

[DNS]
server = 223.5.5.5
server = 119.29.29.29
server = 114.114.114.114
server = /*.icloud.com/119.29.29.29
server = /*.icloud.com.cn/119.29.29.29
server = /*.tencent.com/119.29.29.29
server = /*.weixin.com/119.29.29.29

[Proxy]
# 原 Quantumult X 配置没有 [server_local] / [server_remote] 节点。
# 请在 Shadowrocket 中导入机场订阅或在这里手动添加节点，例如：
# HK = ss, example.com, 8388, encrypt-method=aes-256-gcm, password=PASSWORD

[Proxy Group]
# 下面的组名沿用原 QX 策略名；如果导入节点后不能自动匹配，请在 Shadowrocket 里手动调整分组。
自动选择 = url-test, policy-regex-filter=^(?!.*(?:网易|墨鱼)).*$, url=http://www.gstatic.com/generate_204, interval=900, tolerance=0
香港节点 = url-test, policy-regex-filter=(?=.*(港|HK|Hong))^((?!(台|日|韩|新|美)).)*$, url=http://www.gstatic.com/generate_204, interval=900, tolerance=0
台湾节点 = url-test, policy-regex-filter=(?=.*(台|TW|Taiwan))^((?!(港|日|韩|新|美)).)*$, url=http://www.gstatic.com/generate_204, interval=900, tolerance=0
日本节点 = url-test, policy-regex-filter=(?=.*(日|JP|Japan))^((?!(港|台|韩|新|美)).)*$, url=http://www.gstatic.com/generate_204, interval=900, tolerance=0
狮城节点 = url-test, policy-regex-filter=(?=.*(新|狮|獅|SG|Singapore))^((?!(港|台|日|韩|美)).)*$, url=http://www.gstatic.com/generate_204, interval=900, tolerance=0
美国节点 = url-test, policy-regex-filter=(?=.*(美|US|States|American))^((?!(港|台|日|韩|新)).)*$, url=http://www.gstatic.com/generate_204, interval=900, tolerance=0
苹果服务 = select, DIRECT, 香港节点, 台湾节点, 美国节点, 日本节点, 狮城节点, PROXY
全球加速 = select, 自动选择, DIRECT, 香港节点, 台湾节点, 日本节点, 狮城节点, 美国节点, PROXY
哔哩哔哩 = select, DIRECT, 香港节点, 台湾节点
国际媒体 = select, 台湾节点, 自动选择, DIRECT, 香港节点, 日本节点, 美国节点, 狮城节点, PROXY
兜底分流 = select, 自动选择, 全球加速, DIRECT, 香港节点, 台湾节点, 日本节点, 狮城节点, 美国节点, PROXY

