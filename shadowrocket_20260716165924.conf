FINAL,兜底分流

[URL Rewrite]
# 原 QX rewrite_local 主要是脚本改写，已放到 [Script]。

[Script]
# 手动/事件脚本（Shadowrocket 不一定支持 QX 的 event-network/event-interaction 语义，保留为 type=generic 便于手动触发或按应用支持调整）
网络信息变化 = type=generic, script-path=https://raw.githubusercontent.com/xream/scripts/main/surge/modules/network-info/net-lsp-x.js
网络信息 = type=generic, script-path=https://raw.githubusercontent.com/xream/scripts/main/surge/modules/network-info/net-lsp-x.js
GeoIP 查询 = type=generic, script-path=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/geo_location.js
策略流量查询 = type=generic, script-path=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/traffic-check.js
流媒体解锁查询 = type=generic, script-path=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/streaming-ui-check.js

# 定时任务（由 task_local 转换）
建行生活 = type=cron, cronexp="17 7 * * *", script-path=https://raw.githubusercontent.com/FoKit/Scripts/main/scripts/jhsh_checkIn.js, wake-system=1
高德地图打车签到 = type=cron, cronexp="1 0 * * *", script-path=https://raw.githubusercontent.com/wf021325/qx/master/task/ampDache.js, wake-system=1
万达智慧商业 = type=cron, cronexp="30 9 * * *", script-path=https://raw.githubusercontent.com/leiyiyan/resource/main/script/wdzhsy/wdzhsy.js, wake-system=1
龙湖天街小程序签到、抽奖 = type=cron, cronexp="15 9 * * *", script-path=https://raw.githubusercontent.com/leiyiyan/resource/main/script/lhtj/lhtj.js, wake-system=1
捷停车签到 = type=cron, cronexp="15 9 * * *", script-path=https://raw.githubusercontent.com/FoKit/Scripts/main/scripts/jparking_sign.js, wake-system=1
星星充电 = type=cron, cronexp="17 7 * * *", script-path=https://raw.githubusercontent.com/shengetui/qx/main/xxcd.js, wake-system=1
PP 停车 = type=cron, cronexp="17 7 * * *", script-path=https://raw.githubusercontent.com/FoKit/Scripts/main/scripts/pp_parking.js, wake-system=1
途虎养车 = type=cron, cronexp="17 7 * * *", script-path=https://raw.githubusercontent.com/FoKit/Scripts/main/scripts/tuhu.js, wake-system=1
达美乐 = type=cron, cronexp="30 10 * * *", script-path=https://gist.githubusercontent.com/Sliverkiss/6b4da0d367d13790a9fd1d928c82bdf8/raw/dlm.js, wake-system=1
GLaDOS签到 = type=cron, cronexp="1 0 * * *", script-path=https://raw.githubusercontent.com/evilbutcher/Quantumult_X/master/check_in/glados/glados.js, wake-system=1

# HTTP 脚本（由 rewrite_local 转换）
星星充电获取Cookie = type=http-request, pattern=^https:\/\/gateway\.starcharge\.com\/apph5\/xcxApiV2\/wechat\/starPoint\/sign, script-path=https://raw.githubusercontent.com/shengetui/qx/main/xxcd.js
PP停车获取Cookie = type=http-request, pattern=^https:\/\/api\.660pp\.com\/rest\/[\d\.]+?\/user\/token, script-path=https://raw.githubusercontent.com/FoKit/Scripts/main/scripts/pp_parking.js
途虎养车获取Cookie = type=http-request, pattern=https:\/\/api\.tuhu\.cn\/User\/GetInternalCenterInfo, script-path=https://raw.githubusercontent.com/FoKit/Scripts/main/scripts/tuhu.js
捷停车获取Cookie = type=http-request, pattern=^https:\/\/sytgate\.jslife\.com\.cn\/core-gateway\/order\/carno\/pay\/info, requires-body=1, script-path=https://raw.githubusercontent.com/FoKit/Scripts/main/scripts/jparking_sign.js
京东比价 = type=http-response, pattern=^https?:\/\/api\.m\.jd\.com\/(client\.action|api)\?functionId=(wareBusiness|serverConfig|basicConfig|lite_wareBusiness|pingou_item), requires-body=1, script-path=https://raw.githubusercontent.com/Tartarus2014/Script/master/jf_Convert.js
GLaDOS获取Cookie = type=http-request, pattern=https:\/\/glados\.rocks\/api\/user\/checkin, script-path=https://raw.githubusercontent.com/evilbutcher/Quantumult_X/master/check_in/glados/glados.js
高德地图打车 = type=http-response, pattern=^https?:\/\/(m5(|-zb)|dache)\.amap\.com\/(ws\/yuece\/(act|openapi\/activity\/current)\/query|common\/(alipaymini|wxmini)\?_ENCRYPT=), requires-body=1, script-path=https://raw.githubusercontent.com/wf021325/qx/master/task/ampDache.js

[MITM]
enable = true
skip-server-cert-verify = true
# QX 原 hostname：-*.fcbox.com, -*huami.com, -*amemv.com, -*snssdk.com, -www.google.com, sytgate.jslife.com.cn
# Shadowrocket MITM hostname 通常只需要写需要解密的域名；负号排除项不在此处保留。
hostname = sytgate.jslife.com.cn, gateway.starcharge.com, api.660pp.com, api.tuhu.cn, api.m.jd.com, glados.rocks, *.amap.com

